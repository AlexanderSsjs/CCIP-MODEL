<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CCIP | Plataforma de Cursos</title>
        <link rel="icon" type="image/png" href="img/log.svg" />

        <link rel="apple-touch-icon" href="img/log.svg" />
        <link rel="stylesheet" href="style/styles.css" />

        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div id="header"></div>
        <main id="home"></main>
        <div id="footer"></div>

        <script>
            document.addEventListener('DOMContentLoaded', initApp);

            async function loadComponent(id, file) {
                const container = document.getElementById(id);
                if (!container) return;

                try {
                    const response = await fetch(file);
                    if (!response.ok) throw new Error(`Error ${response.status}`);

                    const html = await response.text();
                    container.innerHTML = html;

                    // Avisamos al CSS que el componente ya cargó
                    container.classList.add('loaded');

                    if (id === 'header') initMenu();
                } catch (error) {
                    console.error(`Error cargando ${file}:`, error);
                    container.innerHTML = `<p style="text-align:center;padding:20px">Error al cargar contenido.</p>`;
                }
            }

            function initMenu() {
                const hamburger = document.querySelector('.hamburger');
                const navMenu = document.querySelector('.nav-menu');
                const navLinks = document.querySelectorAll('.nav-links a');

                if (!hamburger || !navMenu) return;

                function openMenu() {
                    hamburger.classList.add('active');
                    navMenu.classList.add('active');
                    document.body.classList.add('menu-open');
                }

                function closeMenu() {
                    hamburger.classList.remove('active');
                    navMenu.classList.remove('active');
                    document.body.classList.remove('menu-open');
                }

                function toggleMenu() {
                    if (navMenu.classList.contains('active')) {
                        closeMenu();
                    } else {
                        openMenu();
                    }
                }

                hamburger.addEventListener('click', toggleMenu);

                navLinks.forEach((link) => {
                    link.addEventListener('click', closeMenu);
                });

                window.addEventListener('resize', () => {
                    if (window.innerWidth > 992) {
                        closeMenu();
                    }
                });
            }
            async function initApp() {
                // Carga secuencial para mejor control, o Promise.all para velocidad
                await loadComponent('header', 'header.html');
                await loadComponent('home', 'home.html');
                await loadComponent('footer', 'footer.html');
                console.log('Plataforma CCIP lista.');
            }
        </script>
    </body>
</html>
