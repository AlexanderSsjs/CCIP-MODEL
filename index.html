<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CCIP | Plataforma de Cursos</title>
        <link rel="icon" type="image/png" href="img/log.svg" />

        <link rel="apple-touch-icon" href="img/log.svg" />
        <link rel="stylesheet" href="style/styles.css" />

        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap"
            rel="stylesheet"
        />
        <style></style>
    </head>
    <body>
        <div id="header" id="inicio-section"></div>
        <main id="home"></main>
        <div id="footer"></div>

        <script>
            document.addEventListener('DOMContentLoaded', initApp);

// 1. Cargador de componentes con manejo de errores mejorado
async function loadComponent(id, file) {
    const container = document.getElementById(id);
    if (!container) return;

    try {
        const response = await fetch(file);
        if (!response.ok) throw new Error(`Status: ${response.status}`);

        const html = await response.text();
        container.innerHTML = html;
        container.classList.add('loaded');

        // Solo inicializamos el menú si el header fue el componente cargado
        if (id === 'header') initMenu();

        // --- NUEVO: Escuchamos los clics de navegación en el contenido recién cargado ---
        setupDynamicNavigation(container);
        
    } catch (error) {
        console.error(`Error cargando ${file}:`, error);
        container.innerHTML = `
            <div style="text-align:center; padding:20px; color: #d90429; font-size: 14px;">
                Error al cargar contenido.
            </div>`;
    }
}

// NUEVA FUNCIÓN: Maneja los clics en elementos con data-pages
function setupDynamicNavigation(container) {
    const links = container.querySelectorAll('[data-pages]');
    links.forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            const targetFile = link.getAttribute('data-pages');
            // Cargamos el nuevo contenido siempre en el main (#home)
            loadComponent('home', targetFile);
            // Scroll al inicio para mejorar la experiencia
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    });
}

// 2. Lógica del Menú (Más eficiente)
function initMenu() {
    const hamburger = document.querySelector('.hamburger');
    const navMenu = document.querySelector('.nav-menu');
    const navLinks = document.querySelectorAll('.nav-links a');
    const body = document.body;

    if (!hamburger || !navMenu) return;

    const toggleState = (isOpen) => {
        hamburger.classList.toggle('active', isOpen);
        navMenu.classList.toggle('active', isOpen);
        body.classList.toggle('menu-open', isOpen);
        body.style.overflow = isOpen ? 'hidden' : '';
    };

    hamburger.addEventListener('click', () => {
        const isOpened = navMenu.classList.contains('active');
        toggleState(!isOpened);
    });

    navLinks.forEach(link => {
        link.addEventListener('click', async (e) => {
            const href = link.getAttribute('href');

            // Si el enlace es un ancla (ejemplo: #cursos-section)
            if (href && href.startsWith('#')) {
                const targetElement = document.querySelector(href);

                // ESCENARIO: No estamos en Home (ej: estamos en invierte.html)
                if (!targetElement) {
                    e.preventDefault(); // Detenemos el salto fallido
                    toggleState(false); // Cerramos el menú móvil si está abierto

                    console.log("Regresando a la página principal...");

                    // 1. Volvemos a cargar el contenido base de la home
                    await loadComponent('home', 'home.html');

                    // 2. Esperamos un breve momento para que el DOM se actualice
                    setTimeout(() => {
                        const newTarget = document.querySelector(href);
                        if (newTarget) {
                            newTarget.scrollIntoView({ behavior: 'smooth' });
                        } else {
                            // Si es el botón de Inicio o no se encuentra, vamos al top
                            window.scrollTo({ top: 0, behavior: 'smooth' });
                        }
                    }, 100); 
                } else {
                    // Si ya estamos en home, el comportamiento normal del navegador funciona
                    toggleState(false);
                }
            }
        });
    });

    const mql = window.matchMedia('(min-width: 769px)');
    mql.addEventListener('change', (e) => {
        if (e.matches) toggleState(false);
    });
}

// 3. Inicialización controlada
async function initApp() {
    try {
        await Promise.all([
            loadComponent('header', 'header.html'),
            loadComponent('home', 'home.html'),
            loadComponent('footer', 'footer.html')
        ]);
        
        // También activamos la navegación para cualquier enlace data-pages que esté en el header o footer
        setupDynamicNavigation(document.getElementById('header'));
        setupDynamicNavigation(document.getElementById('footer'));

        console.log('🚀 Plataforma CCIP: Todos los módulos listos.');
    } catch (err) {
        console.error("Error en la carga inicial:", err);
    }
}
        </script>
    </body>
</html>
